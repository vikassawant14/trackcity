<h2 class="page-title">🚦 Traffic Monitoring</h2>

<div class="container">

<div class="card">
<h2>Current Traffic</h2>
<p class="status-danger">Heavy Traffic</p>
</div>

<div class="card">
<h2>Accidents</h2>
<p class="status-warning">2 incidents reported</p>
</div>

<div class="card">
<h2>Traffic Prediction</h2>
<p class="status-good">Clear after 8 PM</p>
</div>

</div>


<div id="map" style="height:500px"></div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_KEY"></script>

<script>

function initMap(){

const city = {lat:18.5204,lng:73.8567}

const map = new google.maps.Map(
document.getElementById("map"),
{
zoom:12,
center:city
})

const trafficLayer = new google.maps.TrafficLayer()

trafficLayer.setMap(map)

}

window.onload = initMap

</script>
